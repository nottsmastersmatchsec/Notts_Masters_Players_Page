<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Captains Area — Notts Masters Badminton</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    html, body { margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      overflow-x: hidden;
    }

    .page-wrapper {
      max-width: 1000px;
      margin: 0 auto;
    }

    header {
      background: #0a1a33;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #13294b;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 8px 15px;
      font-weight: 600;
    }

    nav a:hover { text-decoration: underline; }

    .container {
      max-width: 100%;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .btn {
      display: block;
      padding: 14px;
      background: #13294b;
      color: white;
      text-decoration: none;
      font-weight: 600;
      border-radius: 6px;
    }

    .btn:hover {
      background: #0a1a33;
    }

    .error {
      color: #b00020;
      margin-top: 20px;
      font-size: 1.2rem;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      text-align: center;
      background: #0a1a33;
      color: white;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
<div class="page-wrapper">

<header>
  <h1>Notts Masters Badminton</h1>
  <p>Captains & Selectors Area</p>
</header>

<div id="nav"></div>
<script>
  fetch("/Home/nav.html")
    .then(r => r.text())
    .then(html => document.getElementById("nav").innerHTML = html);
</script>

<div class="container" id="content">
  <h2>Checking access…</h2>
</div>

<footer>
  © Notts Masters Badminton — Captains Area
</footer>

</div>

<script>
  const session = JSON.parse(localStorage.getItem("clubSession") || "{}");
  const content = document.getElementById("content");

  if (!session.loggedIn) {
    window.location.href = "/Home/captains/login.html";
  }

  const role = (session.captain_selector || "").toLowerCase().trim();

  if (role !== "captain" && role !== "selector") {
    content.innerHTML = `
      <h2>Access Denied</h2>
      <p class="error">You do not have permission to access the Captains Area.</p>
    `;
  } else {
    content.innerHTML = `
      <h2>Welcome, ${session.first_name || "Captain"}</h2>
      <p>Select a resource below:</p>

      <div class="btn-grid">
        <a class="btn" href="/Home/captains/teamsheets.html">Team Sheets</a>
        <a class="btn" href="/Home/captains/availability.html">Player Availability</a>
        <a class="btn" href="/Home/captains/fixtures.html">Fixtures</a>
        <a class="btn" href="/Home/captains/results.html">Match Results</a>
        <a class="btn" href="/Home/captains/documents.html">Documents</a>
      </div>
    `;
  }
</script>

</body>
</html>
