<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Member Dashboard</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; }
    button { margin-top: 16px; padding: 8px 14px; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eee; margin-left: 8px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Member Dashboard</h1>
  <div id="content"></div>
  <button id="logout">Log out</button>

  <script>
    const raw = localStorage.getItem("clubSession");
    if (!raw) {
      window.location.href = "login.html";
    }

    let session;
    try {
      session = JSON.parse(raw);
    } catch {
      localStorage.removeItem("clubSession");
      window.location.href = "login.html";
    }

    if (!session || !session.loggedIn) {
      window.location.href = "login.html";
    }

    const content = document.getElementById("content");
    content.innerHTML = `
      <p>Welcome, <strong>${session.firstname} ${session.surname}</strong></p>
      <p>Email: ${session.email_address}</p>
      <p>Membership ID: ${session.be_number}</p>
      <p>Age group: ${session.age_group || "N/A"}</p>
      <p>Role:
        <span class="tag">
          ${session.captain_selector ? session.captain_selector : "Player"}
        </span>
      </p>
    `;

    document.getElementById("logout").addEventListener("click", () => {
      localStorage.removeItem("clubSession");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
